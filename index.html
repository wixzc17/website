<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>momo</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000000'/><text x='50' y='65' font-family='Segoe Script' font-size='45' font-style='italic' font-weight='300' text-anchor='middle' fill='%23ffffff'>mo</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000000;
            font-family: Arial, sans-serif;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .momo-logo {
            font-size: 72px;
            font-weight: 300;
            font-style: italic;
            margin-bottom: 30px;
            color: #ffffff;
            font-family: 'Segoe Script', cursive;
            letter-spacing: 3px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.2);
            position: relative;
            display: inline-block;
        }

        .version {
            font-size: 14px;
            color: #ffffff;
            font-weight: 300;
            letter-spacing: 1px;
            position: absolute;
            bottom: -10px;
            right: -35px;
        }

        .search-container {
            width: 100%;
            max-width: 584px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-form {
            display: flex;
            width: 100%;
            border-radius: 24px;
            border: 1px solid #404040;
            padding: 2px;
            background: #000000;
            box-shadow: 0 2px 8px rgba(255,255,255,0.1);
            transition: all 0.3s ease;
        }

        .search-form:hover {
            box-shadow: 0 4px 12px rgba(255,255,255,0.15);
            border-color: #505050;
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 14px 20px;
            font-size: 16px;
            background: transparent;
            color: #ffffff;
        }

        .search-input::placeholder {
            color: #666666;
        }

        .search-input:focus {
            outline: none;
            box-shadow: inset 0 0 0 2px #ffffff;
        }

        .footer {
            text-align: center;
            padding: 20px;
        }

        .copyright {
            font-size: 14px;
            color: #888888;
            font-style: italic;
            font-weight: bold;
            line-height: 1.5;
        }

        .copyright-en {
            margin-bottom: 5px;
        }

        .copyright-zh {
            margin-bottom: 5px;
        }

        .google-credit {
            font-size: 12px;
            color: #666666;
            margin-top: 10px;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .momo-logo {
                font-size: 54px;
                margin-bottom: 20px;
                position: relative;
                display: inline-block;
            }

            .version {
                font-size: 12px;
                color: #ffffff;
                position: absolute;
                bottom: -8px;
                right: -25px;
            }

            .search-container {
                width: 90%;
            }

            .search-form {
                border-radius: 50px;
                padding: 2px;
            }

            .search-input {
                font-size: 18px;
                padding: 16px 24px;
            }

            .search-input::placeholder {
                color: #666666;
            }

            .footer {
                padding: 15px 20px;
            }

            .copyright {
                font-size: 12px;
                line-height: 1.4;
            }

            .google-credit {
                font-size: 11px;
                color: #666666;
                margin-top: 8px;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="momo-logo">momo<span class="version">v0.0.1</span></div>

        <div class="search-container">
            <form class="search-form" action="https://www.google.com/search" method="GET">
                <input type="text" class="search-input" name="q" placeholder="搜索" autocomplete="off">
            </form>
        </div>
    </div>

    <div class="footer">
        <div class="copyright copyright-en">Copyright © 2026 Ren Jifeng & Wang Ziwen All Right Reserved</div>
        <div class="copyright copyright-zh">版权所有 © 2026 任继锋 & 汪子雯 保留所有权利。</div>
        <div class="google-credit">Powered by Google</div>
    </div>
</body>
</html>
