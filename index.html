<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>momo</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%23000000'/><text x='50' y='65' font-family='Segoe Script' font-size='45' font-style='italic' font-weight='300' text-anchor='middle' fill='%23ffffff'>mo</text></svg>">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: #000000;
            font-family: Arial, sans-serif;
        }

        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .momo-logo {
            font-size: 72px;
            font-weight: 300;
            font-style: italic;
            margin-bottom: 30px;
            color: #ffffff;
            font-family: 'Segoe Script', cursive;
            letter-spacing: 3px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.2);
        }

        .search-container {
            width: 100%;
            max-width: 584px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .search-form {
            display: flex;
            width: 100%;
            border-radius: 24px;
            border: 1px solid #333333;
            padding: 0 8px;
            background: #111111;
            box-shadow: 0 1px 3px rgba(255,255,255,0.1);
            transition: all 0.218s ease;
        }

        .search-form:hover {
            box-shadow: 0 1px 5px rgba(255,255,255,0.15);
        }

        .search-input {
            flex: 1;
            border: none;
            outline: none;
            padding: 12px 16px;
            font-size: 16px;
            background: transparent;
            color: #ffffff;
        }

        .search-input::placeholder {
            color: #888888;
        }

        .search-button {
            background: #222222;
            border: none;
            padding: 0 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.218s;
        }

        .search-button:hover {
            background: #333333;
        }

        .search-icon {
            width: 24px;
            height: 24px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path fill="%23ffffff" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>') no-repeat center;
            background-size: contain;
        }

        .footer {
            text-align: center;
            padding: 20px;
        }

        .copyright {
            font-size: 14px;
            color: #888888;
            font-style: italic;
            font-weight: bold;
            line-height: 1.5;
        }

        .copyright-en {
            margin-bottom: 5px;
        }

        .copyright-zh {
            margin-bottom: 5px;
        }

        /* 手机端适配 */
        @media (max-width: 768px) {
            .momo-logo {
                font-size: 54px;
                margin-bottom: 20px;
            }

            .search-container {
                width: 90%;
            }

            .search-form {
                border-radius: 50px;
                padding: 0 4px;
            }

            .search-input {
                font-size: 18px;
                padding: 16px 20px;
            }

            .search-input::placeholder {
                color: #888888;
            }

            .search-button {
                padding: 0 12px;
                background: #222222;
            }

            .search-button:hover {
                background: #333333;
            }

            .search-icon {
                width: 20px;
                height: 20px;
            }

            .footer {
                padding: 15px 20px;
            }

            .copyright {
                font-size: 12px;
                line-height: 1.4;
            }
        }
    </style>
</head>
<body>
    <div class="main-content">
        <div class="momo-logo">momo</div>

        <div class="search-container">
            <form class="search-form" action="https://www.google.com/search" method="GET">
                <input type="text" class="search-input" name="q" placeholder="搜索" autocomplete="off">
                <button type="submit" class="search-button">
                    <div class="search-icon"></div>
                </button>
            </form>
        </div>
    </div>

    <div class="footer">
        <div class="copyright copyright-en">Copyright © 2026 Ren Jifeng & Wang Ziwen All Right Reserved</div>
        <div class="copyright copyright-zh">版权所有 © 2026 任继锋 & 汪子雯 保留所有权利。</div>
    </div>
</body>
</html>
